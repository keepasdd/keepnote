spring:
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      database: 0
      host: localhost
      port: 6379

  application:
    name: knowledge-base
  datasource:
    url: jdbc:mysql://localhost:3306/knowledge_base?useUnicode=true&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver


mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

jwt:
  secret: knowledge-base-secret-key-must-be-at-least-32-bytes

 # application.yml (这是要提交到 GitHub 的)
tencent:
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID:mysecreteid}
    secret-key: ${TENCENT_COS_SECRET_KEY:mysecretekey}
