version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: keepnote-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: knowledge_base
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - keepnote-net

  redis:
    image: redis:7.0
    container_name: keepnote-redis
    networks:
      - keepnote-net

  app:
    build: .
    container_name: keepnote-app
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/knowledge_base?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
    networks:
      - keepnote-net

  nginx:
    image: nginx:alpine
    container_name: keepnote-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./keepnote-vue/dist:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - keepnote-net

volumes:
  mysql_data:

networks:
  keepnote-net: